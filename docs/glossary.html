<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logic — Verified Glossary</title>
  <meta name="description" content="Verified universal truths discovered by independent convergence through the Logic Concept Engine collective network.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0b;
      --bg2: #141416;
      --bg3: #1c1c1f;
      --text: #e4e4e7;
      --text2: #a1a1aa;
      --text3: #71717a;
      --accent: #a78bfa;
      --accent-dim: #7c3aed;
      --border: #27272a;
      --success: #22c55e;
      --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      line-height: 1.6;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Header */
    .page-header {
      text-align: center;
      padding: 60px 0 40px;
    }

    .logo-link {
      text-decoration: none;
      color: inherit;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .logo {
      width: 40px;
      height: 40px;
      background: var(--accent);
      color: #000;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 20px;
      font-family: var(--mono);
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
    }

    h1 {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .page-desc {
      font-size: 16px;
      color: var(--text2);
      max-width: 560px;
      margin: 0 auto 8px;
    }

    .page-meta {
      font-size: 12px;
      color: var(--text3);
      margin-top: 16px;
    }

    .page-meta .refresh-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      margin-right: 4px;
      vertical-align: middle;
    }

    /* Stats */
    .stats-bar {
      display: flex;
      gap: 32px;
      justify-content: center;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .stat-value {
      font-family: var(--mono);
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-label {
      font-size: 11px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Level groups */
    .level-group {
      margin-bottom: 32px;
    }

    .level-group-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
    }

    .level-tag {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      background: rgba(167, 139, 250, 0.1);
      padding: 4px 10px;
      border-radius: 6px;
      letter-spacing: 0.03em;
    }

    .level-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .level-count {
      font-size: 11px;
      color: var(--text3);
      margin-left: auto;
    }

    /* Entry cards */
    .entry {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }

    .entry:hover {
      border-color: rgba(167, 139, 250, 0.3);
    }

    .entry-levels {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }

    .entry-description {
      font-size: 15px;
      color: var(--text);
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .entry-meta {
      display: flex;
      gap: 16px;
      font-size: 11px;
      color: var(--text3);
    }

    .entry-convergence {
      color: var(--success);
    }

    .entry-perspectives {
      font-size: 12px;
      color: var(--text3);
      font-style: italic;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      line-height: 1.5;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text3);
    }

    .empty-state .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .empty-state p {
      font-size: 15px;
      max-width: 400px;
      margin: 0 auto;
    }

    /* Loading */
    .loading-state {
      text-align: center;
      padding: 80px 20px;
    }

    .loading-dots {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .loading-dots span {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: glossaryPulse 1.4s infinite;
    }

    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes glossaryPulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* Footer */
    footer {
      padding: 40px 0;
      border-top: 1px solid var(--border);
      text-align: center;
      color: var(--text3);
      font-size: 13px;
    }

    footer a {
      color: var(--text2);
      text-decoration: none;
    }

    footer a:hover {
      color: var(--accent);
    }

    /* Error */
    .error-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text3);
    }

    @media (max-width: 600px) {
      h1 { font-size: 28px; }
      .stats-bar { gap: 20px; }
      .stat-value { font-size: 20px; }
      .entry { padding: 12px 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <a href="index.html" class="logo-link">
        <div class="logo">P</div>
        <span class="logo-text">Logic</span>
      </a>
      <h1>Epistemic Glossary</h1>
      <p class="page-desc">Knowledge classified by epistemic status. Each entry was discovered by independent convergence — multiple users found the same truth separately.</p>
      <div class="page-meta" id="pageMeta"></div>
    </div>

    <div class="stats-bar" id="statsBar" style="display:none;">
      <div class="stat">
        <span class="stat-value" id="totalEntries">0</span>
        <span class="stat-label">verified truths</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="totalLevels">0</span>
        <span class="stat-label">levels touched</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="totalConvergence">0</span>
        <span class="stat-label">avg. convergence</span>
      </div>
    </div>

    <div id="glossaryContent">
      <div class="loading-state">
        <div class="loading-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <footer>
      <p><a href="index.html">Logic</a> &middot; <a href="https://github.com/joseandv-creator/logic-concept-engine">GitHub</a> &middot; <a href="privacy-policy.html">Privacy</a></p>
      <p style="margin-top: 8px;">The territory decides.</p>
    </footer>
  </div>

  <script>
    const SUPABASE_URL = 'https://mvropqfconacrexevcsn.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12cm9wcWZjb25hY3JleGV2Y3NuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyODQzNjQsImV4cCI6MjA4ODg2MDM2NH0.nNsTsNDgK2GNs1LTtL7KcixHXoFNmmb2fApzyBf5Tv4';
    const REFRESH_INTERVAL = 30 * 60 * 1000;

    // Epistemic hierarchy — ordered from highest to lowest C
    const EPISTEMIC_CATEGORIES = [
      { key: 'empirical',   name: 'Empirical Fact',  desc: 'Verifiable against territory independently of who states it', cRange: 'C > 0.7',           color: 'var(--success)' },
      { key: 'inference',   name: 'Inference',        desc: 'Derived from empirical facts by a single logical step',       cRange: 'C 0.5 – 0.7',       color: '#3b82f6' },
      { key: 'deduction',   name: 'Deduction',        desc: 'Chain of reasoning — multiple steps from territory',          cRange: 'C 0.3 – 0.5',       color: '#f59e0b' },
      { key: 'conjecture',  name: 'Conjecture',       desc: 'Hypothesis with high convergence but insufficient C — shown only with 5+ independent discoverers', cRange: 'C < 0.3', color: '#ef4444' },
      { key: 'refuted',     name: 'Refuted',          desc: 'Once convergent, later contradicted by territory — kept visible so no one rediscovers it as new', cRange: 'C = 0', color: '#71717a' }
    ];

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function classifyEntry(entry, refutedIds) {
      if (refutedIds.has(entry.id)) return 'refuted';
      const c = entry.avg_c_after || 0;
      if (c > 0.7) return 'empirical';
      if (c >= 0.5) return 'inference';
      if (c >= 0.3) return 'deduction';
      return 'conjecture';
    }

    async function fetchData() {
      const headers = {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      };

      const [relationsRes, refutationsRes] = await Promise.all([
        fetch(SUPABASE_URL + '/rest/v1/convergent_relations?select=*&status=eq.approved&order=convergence_count.desc', { headers }),
        fetch(SUPABASE_URL + '/rest/v1/rpc/get_deprecated_updates', {
          method: 'POST', headers, body: JSON.stringify({ threshold: 3 })
        }).catch(() => ({ ok: true, json: () => [] }))
      ]);

      if (!relationsRes.ok) throw new Error('Failed to fetch');

      const relations = await relationsRes.json();
      let refutedIds = new Set();
      try {
        const deprecated = await refutationsRes.json();
        if (Array.isArray(deprecated)) {
          deprecated.forEach(d => refutedIds.add(d.id || d.update_id));
        }
      } catch (e) {}

      return { relations, refutedIds };
    }

    function renderGlossary(relations, refutedIds) {
      const content = document.getElementById('glossaryContent');
      const statsBar = document.getElementById('statsBar');
      const meta = document.getElementById('pageMeta');

      if (!relations || relations.length === 0) {
        content.innerHTML = '<div class="empty-state"><div class="empty-icon">&#9670;</div><p>No verified truths yet. The collective network needs more independent discoveries to converge. Install Logic and start exploring.</p></div>';
        meta.innerHTML = '<span class="refresh-dot"></span> Live — auto-refreshes every 30 minutes';
        return;
      }

      // Classify into epistemic groups
      const groups = {};
      EPISTEMIC_CATEGORIES.forEach(cat => { groups[cat.key] = []; });

      relations.forEach(entry => {
        const cat = classifyEntry(entry, refutedIds);
        // Conjectures only shown with high convergence (5+)
        if (cat === 'conjecture' && (entry.convergence_count || 0) < 5) return;
        groups[cat].push(entry);
      });

      // Stats
      const allLevels = new Set();
      let totalConv = 0;
      relations.forEach(e => {
        e.level_combo.split('+').forEach(l => allLevels.add(l.trim()));
        totalConv += e.convergence_count || 0;
      });

      document.getElementById('totalEntries').textContent = relations.length;
      document.getElementById('totalLevels').textContent = allLevels.size;
      document.getElementById('totalConvergence').textContent = (totalConv / relations.length).toFixed(1);
      statsBar.style.display = 'flex';

      // Render
      let html = '';

      EPISTEMIC_CATEGORIES.forEach(cat => {
        const entries = groups[cat.key];
        if (entries.length === 0) return;

        html += '<div class="level-group">';
        html += '<div class="level-group-header">';
        html += '<span class="level-tag" style="color:' + cat.color + ';background:' + cat.color + '15;">' + escapeHtml(cat.cRange) + '</span>';
        html += '<span class="level-name">' + escapeHtml(cat.name) + '</span>';
        html += '<span class="level-count">' + entries.length + (entries.length === 1 ? ' entry' : ' entries') + '</span>';
        html += '</div>';
        html += '<div style="font-size:12px;color:var(--text3);margin-bottom:12px;">' + escapeHtml(cat.desc) + '</div>';

        entries.forEach(entry => {
          const convText = entry.convergence_count + ' independent discoverers';
          const cBefore = (entry.avg_c_before || 0).toFixed(2);
          const cAfter = (entry.avg_c_after || 0).toFixed(2);
          const isRefuted = cat.key === 'refuted';

          let date = '';
          if (entry.published_at) {
            date = new Date(entry.published_at).toLocaleDateString('en', { year: 'numeric', month: 'short', day: 'numeric' });
          }

          html += '<div class="entry"' + (isRefuted ? ' style="opacity:0.6;border-left:3px solid var(--text3);"' : '') + '>';
          html += '<div class="entry-levels">' + escapeHtml(entry.level_combo) + '</div>';
          html += '<div class="entry-description"' + (isRefuted ? ' style="text-decoration:line-through;"' : '') + '>' + escapeHtml(entry.description) + '</div>';
          html += '<div class="entry-meta">';
          html += '<span class="entry-convergence">' + escapeHtml(convText) + '</span>';
          html += '<span>C: ' + escapeHtml(cBefore) + ' &rarr; ' + escapeHtml(cAfter) + '</span>';
          if (date) html += '<span>' + escapeHtml(date) + '</span>';
          html += '</div>';
          html += '</div>';
        });

        html += '</div>';
      });

      content.innerHTML = html;

      const now = new Date().toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit' });
      meta.innerHTML = '<span class="refresh-dot"></span> Last updated: ' + now + ' — auto-refreshes every 30 minutes';
    }

    async function loadGlossary() {
      try {
        const { relations, refutedIds } = await fetchData();
        renderGlossary(relations, refutedIds);
      } catch (e) {
        document.getElementById('glossaryContent').innerHTML = '<div class="error-state"><p>Could not load the glossary. The collective network may be temporarily unavailable.</p></div>';
      }
    }

    loadGlossary();
    setInterval(loadGlossary, REFRESH_INTERVAL);
  </script>
</body>
</html>
